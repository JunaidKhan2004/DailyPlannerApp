name: daily_planner_app
description: "Production-level daily planner app (offline-first)."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Local database (offline-first)
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0

  # Routing
  go_router: ^14.8.1

  # UI
  table_calendar: ^3.1.3
  flutter_slidable: ^3.1.2
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  connectivity_plus: ^6.1.3
  iconsax_flutter: ^1.0.1

  # Notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.5
  firebase_crashlytics: ^4.3.5
  firebase_analytics: ^11.4.5

  # Persistence (settings, onboarding flag)
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

